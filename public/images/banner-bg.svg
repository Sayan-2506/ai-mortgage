<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <!-- большой центральный -->
  <rect x="180" y="80" width="144" height="144" rx="20" fill="#2563eb" fill-opacity="0.5" transform="rotate(12 252 152)"/>
  <!-- правый большой -->
  <rect x="360" y="60" width="176" height="176" rx="20" fill="#3b82f6" fill-opacity="0.4" transform="rotate(6 448 148)"/>
  <!-- правый верхний -->
  <rect x="440" y="20" width="128" height="128" rx="20" fill="#1d4ed8" fill-opacity="0.6" transform="rotate(-6 504 84)"/>
  <!-- правый нижний -->
  <rect x="340" y="180" width="112" height="112" rx="16" fill="#60a5fa" fill-opacity="0.3" transform="rotate(12 396 236)"/>
  <!-- левее нижний -->
  <rect x="200" y="190" width="80" height="80" rx="14" fill="#2563eb" fill-opacity="0.4" transform="rotate(3 240 230)"/>
</svg>